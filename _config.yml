# Welcome to Jekyll!
# This config file is for settings that affect your whole blog.

# Site settings
title: "이민형 | Portfolio"
email: "971023als@gmail.com"
description: "사용자 중심의 웹 환경을 설계하고 AI 기술을 탐구하는 개발자 이민형의 포트폴리오입니다."
baseurl: "" # 루트 디렉터리 사용
url: "https://971023als.github.io" # 실제 배포 URL로 업데이트

twitter_username: "jekyllrb"
github_username: "971023als"

# Post settings
future: true
timezone: "Asia/Seoul" # 시간대를 명시적으로 설정
encoding: "UTF-8" # UTF-8 인코딩 설정

# Author settings
author:
  name: "이민형"
  email: "971023als@gmail.com"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
# - jekyll-admin

# Google Analytics
google_analytics: "G-EKFW13SDS5"

# Include directories (assets/uploads 포함)
include:
  - assets/uploads

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - favicon.ico

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM # GitHub Flavored Markdown 사용
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span_element: "code"


# Collections (if using additional pages like 'about')
collections:
  pages:
    output: true

# Static file settings
static_files:
  - assets/uploads # 정적 파일 경로 추가

# Sass configuration
sass:
  sass_dir: _sass
  style: compressed

# Serve settings (Optional)
defaults:
  - scope:
      path: ""
    values:
      layout: "default" # 기본 레이아웃 설정
